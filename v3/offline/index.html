<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Offline - Attendance Online</title>
  <style>
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:#020617;color:#f8fafc;font-family:system-ui,sans-serif;padding:24px}
    .card{max-width:420px;background:#0f172a;border:1px solid rgba(148,163,184,.25);border-radius:24px;padding:24px;text-align:center}
    .logo{width:72px;height:72px;margin:auto;border-radius:24px;display:grid;place-items:center;background:linear-gradient(135deg,#38bdf8,#22c55e);color:#00111f;font-weight:900;font-size:28px}
    p{color:#94a3b8}
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">A3</div>
    <h1>ออฟไลน์อยู่</h1>
    <p>เปิดข้อมูลพื้นฐานได้ แต่การลงเวลา/บันทึกข้อมูลต้องใช้อินเทอร์เน็ต กรุณาเชื่อมต่อแล้วลองใหม่</p>
  </div>
</body>
</html>
